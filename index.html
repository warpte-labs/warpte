<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warp</title>
  <meta name="description" content="Warp — Grok sidebar agent for VS Code &amp; Cursor" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://warpte.com/" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      display: flex;
      flex-direction: column;
    }

    /* ── Header — same content width as original landing (980px) ── */
    .hdr-bar {
      flex-shrink: 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .hdr {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .brand-mark {
      width: 22px;
      height: 22px;
      display: block;
    }
    .brand-mark rect { fill: #c5c5c5; }
    .hdr-links {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .hdr-links a {
      color: #8a8a8a;
      text-decoration: none;
      font-size: 12px;
    }
    .hdr-links a:hover { color: #e8e8e8; }

    /* ── Main ── */
    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 24px 16px 48px;
    }

    /* Same hero W as extension chat empty state — much larger */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      pointer-events: none;
    }
    .hero-svg {
      width: min(600px, 92vw);
      height: auto;
      aspect-ratio: 390 / 230;
      user-select: none;
      overflow: hidden;
      pointer-events: auto;
      cursor: default;
    }
    .hero-svg .w-tile {
      fill: #6e6e6e;
    }
    .hero-svg .w-tile.core {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 140ms cubic-bezier(0.22, 1, 0.36, 1), fill 140ms ease;
    }
    .hero-svg .w-tile.particle {
      fill: #6e6e6e;
      pointer-events: none;
      transition: transform 100ms ease-out;
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-svg .particle-layer { display: none; }
      .hero-svg { pointer-events: none; }
      .hero-svg .w-tile.core { transition: none; }
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 100%;
    }
    .cmd {
      font-size: 12.5px;
      color: #b0b0b0;
      background: #121212;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      white-space: nowrap;
      overflow-x: auto;
      max-width: min(520px, 88vw);
      user-select: all;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12.5px;
      font-weight: 650;
      font-family: inherit;
      text-decoration: none;
      color: #0a0a0a;
      background: #ff5a00;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      white-space: nowrap;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(1.06); }
  </style>
</head>
<body>
  <div class="hdr-bar">
    <header class="hdr">
      <a class="brand" href="/">
        <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <g transform="translate(1.2,4.2) scale(0.0435)">
            <rect x="87" y="150" width="11" height="11"/><rect x="100" y="150" width="11" height="11"/><rect x="112" y="150" width="11" height="11"/><rect x="124" y="150" width="11" height="11"/><rect x="212" y="150" width="11" height="11"/><rect x="224" y="150" width="11" height="11"/><rect x="237" y="150" width="11" height="11"/><rect x="250" y="150" width="11" height="11"/><rect x="337" y="150" width="11" height="11"/><rect x="350" y="150" width="11" height="11"/><rect x="374" y="150" width="11" height="11"/>
            <rect x="100" y="200" width="11" height="11"/><rect x="212" y="200" width="11" height="11"/><rect x="250" y="200" width="11" height="11"/><rect x="337" y="200" width="11" height="11"/>
            <rect x="150" y="338" width="11" height="11"/><rect x="187" y="338" width="11" height="11"/><rect x="274" y="338" width="11" height="11"/><rect x="312" y="338" width="11" height="11"/>
          </g>
        </svg>
        <span>Warp</span>
      </a>
      <nav class="hdr-links">
        <a href="https://github.com/weightliftgurutools/warp" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/weightliftgurutools/warp/releases/latest" target="_blank" rel="noopener">Releases</a>
      </nav>
    </header>
  </div>

  <main class="main">
    <div class="hero" id="hero" aria-label="Warp"></div>
    <div class="row">
      <code class="cmd">code --install-extension warp-agent.warp</code>
      <a class="btn" href="vscode:extension/warp-agent.warp">Install</a>
    </div>
  </main>

  <script src="/hero.js"></script>
  <script>
    (function () {
      fetch("/tiles.json")
        .then(function (r) { return r.json(); })
        .then(function (tiles) {
          var hero = document.getElementById("hero");
          var H = window.Warp && window.Warp.hero;
          if (!hero || !H) return;
          H.mount(hero, tiles);
          H.setEmpty(hero, true, tiles, { played: false, forceReplay: false });
        })
        .catch(function () {});
    })();
  </script>
</body>
</html>
